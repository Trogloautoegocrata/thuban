<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thuban — Iniciar Sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ===== RESET ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #0c0c0f;
      color: #f0f0f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
    }

    /* ===== GLOW ORB ===== */
    .glow-orb {
      position: fixed;
      top: -30%;
      right: -20%;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(245,158,11,0.08) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      animation: orbPulse 8s ease-in-out infinite alternate;
    }
    .glow-orb--bottom {
      top: auto;
      bottom: -25%;
      right: auto;
      left: -15%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(245,158,11,0.05) 0%, transparent 70%);
      animation-delay: -4s;
    }
    @keyframes orbPulse {
      0%   { transform: translate(0, 0) scale(1); opacity: 0.6; }
      100% { transform: translate(40px, -30px) scale(1.15); opacity: 1; }
    }

    /* ===== LOGIN CARD ===== */
    .auth-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      padding: 1.5rem;
    }
    .auth-card {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 1.5rem;
      padding: 2.5rem 2rem;
      box-shadow: 0 0 60px rgba(245,158,11,0.04), 0 8px 32px rgba(0,0,0,0.4);
      transition: border-color 0.3s ease;
    }
    .auth-card:hover {
      border-color: rgba(245,158,11,0.12);
    }

    /* ===== LOGO ===== */
    .auth-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.65rem;
      margin-bottom: 0.5rem;
      text-decoration: none;
    }
    .auth-logo-icon {
      width: 36px;
      height: 36px;
      position: relative;
    }
    .auth-logo-icon svg {
      width: 100%;
      height: 100%;
    }
    .auth-logo-text {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
    }
    .auth-logo-star {
      color: #f59e0b;
      font-size: 1.25rem;
    }
    .auth-subtitle {
      text-align: center;
      color: rgba(255,255,255,0.4);
      font-size: 0.875rem;
      font-weight: 400;
      margin-bottom: 2rem;
    }

    /* ===== FORM ===== */
    .auth-form { display: flex; flex-direction: column; gap: 1.25rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
    .form-label {
      font-size: 0.8125rem;
      font-weight: 500;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.01em;
    }
    .form-input {
      font-family: 'Inter', sans-serif;
      width: 100%;
      padding: 0.85rem 1rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 0.75rem;
      color: #f0f0f5;
      font-size: 0.9375rem;
      outline: none;
      transition: all 0.25s ease;
    }
    .form-input::placeholder { color: rgba(255,255,255,0.2); }
    .form-input:focus {
      border-color: rgba(245,158,11,0.5);
      background: rgba(255,255,255,0.06);
      box-shadow: 0 0 0 3px rgba(245,158,11,0.08);
    }
    .form-input.error {
      border-color: rgba(239,68,68,0.5);
      box-shadow: 0 0 0 3px rgba(239,68,68,0.08);
    }
    .form-input--password-wrapper {
      position: relative;
    }
    .toggle-password {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255,255,255,0.3);
      cursor: pointer;
      font-size: 1rem;
      padding: 0.25rem;
      transition: color 0.2s ease;
      line-height: 1;
    }
    .toggle-password:hover { color: rgba(255,255,255,0.6); }

    /* ===== CHECKBOX ROW ===== */
    .form-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8125rem;
      color: rgba(255,255,255,0.45);
      cursor: pointer;
      transition: color 0.2s ease;
      user-select: none;
    }
    .checkbox-label:hover { color: rgba(255,255,255,0.65); }
    .checkbox-label input[type="checkbox"] {
      width: 1rem;
      height: 1rem;
      accent-color: #f59e0b;
      border-radius: 0.25rem;
      cursor: pointer;
    }
    .forgot-link {
      font-size: 0.8125rem;
      color: rgba(245,158,11,0.7);
      text-decoration: none;
      transition: color 0.2s ease;
    }
    .forgot-link:hover { color: #f59e0b; }

    /* ===== BUTTON ===== */
    .btn-primary {
      font-family: 'Inter', sans-serif;
      width: 100%;
      padding: 0.9rem 1.5rem;
      border: none;
      border-radius: 0.75rem;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: #0c0c0f;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #d97706, #b45309);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .btn-primary:hover::before { opacity: 1; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary span { position: relative; z-index: 1; }
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* ===== SPINNER ===== */
    .spinner {
      display: inline-block;
      width: 1.25rem;
      height: 1.25rem;
      border: 2px solid rgba(12,12,15,0.2);
      border-top-color: #0c0c0f;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      position: relative;
      z-index: 1;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== ERROR / SUCCESS ===== */
    .form-message {
      display: none;
      padding: 0.75rem 1rem;
      border-radius: 0.75rem;
      font-size: 0.8125rem;
      font-weight: 500;
      margin-top: 0.25rem;
    }
    .form-message--error {
      display: block;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      color: #f87171;
    }
    .form-message--success {
      display: block;
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.2);
      color: #4ade80;
    }

    /* ===== FOOTER LINK ===== */
    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.875rem;
      color: rgba(255,255,255,0.3);
    }
    .auth-footer a {
      color: rgba(245,158,11,0.7);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s ease;
    }
    .auth-footer a:hover { color: #f59e0b; }

    /* ===== TOAST ===== */
    .toast-container {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      z-index: 999;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      max-width: 380px;
    }
    .toast {
      padding: 1rem 1.25rem;
      border-radius: 0.75rem;
      font-size: 0.875rem;
      font-weight: 500;
      backdrop-filter: blur(16px);
      animation: toastIn 0.35s ease forwards;
      display: flex;
      align-items: center;
      gap: 0.625rem;
    }
    .toast--error {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.25);
      color: #f87171;
    }
    .toast--success {
      background: rgba(34,197,94,0.15);
      border: 1px solid rgba(34,197,94,0.25);
      color: #4ade80;
    }
    .toast--info {
      background: rgba(59,130,246,0.15);
      border: 1px solid rgba(59,130,246,0.25);
      color: #60a5fa;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(40px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .toast-out {
      animation: toastOut 0.3s ease forwards;
    }
    @keyframes toastOut {
      from { opacity: 1; transform: translateX(0); }
      to   { opacity: 0; transform: translateX(40px); }
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .auth-card { padding: 2rem 1.5rem; border-radius: 1.25rem; }
      .glow-orb { width: 400px; height: 400px; top: -20%; right: -30%; }
      .glow-orb--bottom { width: 300px; height: 300px; }
    }
    @media (max-width: 480px) {
      .auth-wrapper { padding: 1rem; }
      .auth-card { padding: 1.75rem 1.25rem; border-radius: 1rem; }
      .auth-logo-text { font-size: 1.25rem; }
      .form-input { padding: 0.75rem 0.875rem; font-size: 0.875rem; }
      .btn-primary { padding: 0.8rem 1.25rem; }
      .form-row { flex-direction: column; align-items: flex-start; gap: 0.75rem; }
    }
  </style>
</head>
<body>
  <!-- Glow Orbs -->
  <div class="glow-orb" aria-hidden="true"></div>
  <div class="glow-orb glow-orb--bottom" aria-hidden="true"></div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer" role="alert" aria-live="polite"></div>

  <!-- Auth Card -->
  <main class="auth-wrapper">
    <div class="auth-card">
      <!-- Logo -->
      <a href="/" class="auth-logo" aria-label="Thuban inicio">
        <div class="auth-logo-icon">
          <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="18" cy="18" r="16" stroke="#f59e0b" stroke-width="1.5" fill="rgba(245,158,11,0.06)" />
            <path d="M18 8 L20 14 L26 14 L21 18 L23 24 L18 20 L13 24 L15 18 L10 14 L16 14 Z" fill="#f59e0b" opacity="0.9" />
          </svg>
        </div>
        <span class="auth-logo-text">Thuban</span>
        <span class="auth-logo-star">✦</span>
      </a>
      <p class="auth-subtitle">Accede a tu panel de inteligencia inmobiliaria</p>

      <!-- Form -->
      <form class="auth-form" id="loginForm" novalidate>
        <!-- Email -->
        <div class="form-group">
          <label class="form-label" for="email">Correo electrónico</label>
          <input class="form-input" type="email" id="email" name="email"
                 placeholder="tu@correo.com" autocomplete="email"
                 required aria-required="true" />
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <div class="form-input--password-wrapper">
            <input class="form-input" type="password" id="password" name="password"
                   placeholder="••••••••" autocomplete="current-password"
                   required aria-required="true" />
            <button class="toggle-password" type="button" aria-label="Mostrar contraseña" data-toggle>
              👁
            </button>
          </div>
        </div>

        <!-- Row: Remember + Forgot -->
        <div class="form-row">
          <label class="checkbox-label">
            <input type="checkbox" name="remember" />
            Recordarme
          </label>
          <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
        </div>

        <!-- Message -->
        <div class="form-message" id="formMessage"></div>

        <!-- Submit -->
        <button class="btn-primary" type="submit" id="submitBtn">
          <span>Iniciar Sesión</span>
        </button>
      </form>

      <p class="auth-footer">
        ¿No tienes cuenta? <a href="signup.html">Regístrate</a>
      </p>
    </div>
  </main>

  <script>
    (function() {
      const form = document.getElementById('loginForm');
      const submitBtn = document.getElementById('submitBtn');
      const msg = document.getElementById('formMessage');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const toggleBtn = document.querySelector('[data-toggle]');
      const toastContainer = document.getElementById('toastContainer');

      /** Show toast notification */
      function showToast(text, type) {
        const el = document.createElement('div');
        el.className = 'toast toast--' + type;
        el.textContent = text;
        toastContainer.appendChild(el);
        setTimeout(() => {
          el.classList.add('toast-out');
          el.addEventListener('animationend', () => el.remove());
        }, 4000);
      }

      /** Toggle password visibility */
      if (toggleBtn) {
        toggleBtn.addEventListener('click', function() {
          const isPassword = passwordInput.type === 'password';
          passwordInput.type = isPassword ? 'text' : 'password';
          this.setAttribute('aria-label', isPassword ? 'Ocultar contraseña' : 'Mostrar contraseña');
          this.textContent = isPassword ? '🙈' : '👁';
        });
      }

      /** Set loading state */
      function setLoading(loading) {
        if (loading) {
          submitBtn.disabled = true;
          submitBtn.querySelector('span').textContent = '';
          const spinner = document.createElement('div');
          spinner.className = 'spinner';
          spinner.setAttribute('role', 'status');
          spinner.setAttribute('aria-label', 'Cargando');
          submitBtn.prepend(spinner);
        } else {
          submitBtn.disabled = false;
          const sp = submitBtn.querySelector('.spinner');
          if (sp) sp.remove();
          submitBtn.querySelector('span').textContent = 'Iniciar Sesión';
        }
      }

      /** Show form message */
      function showMessage(text, type) {
        msg.textContent = text;
        msg.className = 'form-message form-message--' + type;
        if (type === 'error') {
          emailInput.classList.toggle('error', text.toLowerCase().includes('email'));
          passwordInput.classList.toggle('error', text.toLowerCase().includes('contrase'));
        }
      }

      function clearMessage() {
        msg.textContent = '';
        msg.className = 'form-message';
        emailInput.classList.remove('error');
        passwordInput.classList.remove('error');
      }

      /** Simple email validation */
      function isValidEmail(v) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
      }

      /** Submit handler */
      form.addEventListener('submit', async function(e) {
        e.preventDefault();
        clearMessage();

        const email = emailInput.value.trim();
        const password = passwordInput.value;

        // Client-side validation
        if (!email) { showMessage('Ingresa tu correo electrónico', 'error'); emailInput.focus(); return; }
        if (!isValidEmail(email)) { showMessage('Ingresa un correo válido', 'error'); emailInput.focus(); return; }
        if (!password) { showMessage('Ingresa tu contraseña', 'error'); passwordInput.focus(); return; }
        if (password.length < 6) { showMessage('La contraseña debe tener al menos 6 caracteres', 'error'); passwordInput.focus(); return; }

        setLoading(true);

        // Simulate API call
        try {
          await new Promise((resolve, reject) => {
            setTimeout(() => {
              if (email === 'demo@thuban.ai' && password === 'thuban123') {
                resolve();
              } else {
                reject(new Error('Credenciales incorrectas. Prueba con demo@thuban.ai / thuban123'));
              }
            }, 1500);
          });

          // Success
          showMessage('Inicio de sesión exitoso. Redirigiendo...', 'success');
          showToast('¡Bienvenido de nuevo a Thuban!', 'success');
          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 800);
        } catch (err) {
          showMessage(err.message, 'error');
          showToast(err.message, 'error');
          setLoading(false);
        }
      });

      // Real-time error clearing
      emailInput.addEventListener('input', function() {
        this.classList.remove('error');
        if (msg.classList.contains('form-message--error')) clearMessage();
      });
      passwordInput.addEventListener('input', function() {
        this.classList.remove('error');
        if (msg.classList.contains('form-message--error')) clearMessage();
      });
    })();
  </script>
</body>
</html>
