# Impeccable Design Check
#
# Ejecuta npx impeccable detect en cada Pull Request para detectar
# anti-patrones de UI y drift del design system.
#
# Fase 1: Modo warning (no bloquea PRs)
# Fase 2 (futuro): Modo blocking tras calibrar thresholds
#
# Documentación: https://impeccable.style

name: Impeccable Design Check

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/**'
      - '*.css'

jobs:
  detect:
    name: UI Anti-pattern Detection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Run Impeccable detect
        id: impeccable
        continue-on-error: true
        run: |
          npx impeccable detect src/ 2>&1 | tee /tmp/impeccable-report.txt

      - name: Check results
        run: |
          REPORT=/tmp/impeccable-report.txt
          if [ ! -f "$REPORT" ]; then
            echo "⚠️ No se generó reporte de Impeccable"
            exit 0
          fi

          # Contar findings totales
          TOTAL=$(grep -c "\[" "$REPORT" 2>/dev/null || echo 0)
          echo "📊 Findings totales: $TOTAL"

          # Separar por tipo
          ANTIPATTERNS=$(grep -v "design-system" "$REPORT" | grep -c "\[" 2>/dev/null || echo 0)
          DRIFT=$(grep -c "design-system" "$REPORT" 2>/dev/null || echo 0)
          echo "🔴 Anti-patrones UI: $ANTIPATTERNS"
          echo "🔵 Design-system drift: $DRIFT"

          # Mostrar anti-patrones si existen
          if [ "$ANTIPATTERNS" -gt 0 ]; then
            echo ""
            echo "### 🔴 Anti-patrones encontrados"
            grep -v "design-system" "$REPORT" | grep "\[" | while read line; do
              echo "- $line"
            done
          fi

          # Solo falla si hay anti-patrones UI reales
          if [ "$ANTIPATTERNS" -gt 0 ]; then
            echo ""
            echo "❌ Se encontraron $ANTIPATTERNS anti-patrones de UI. Revisa los detalles arriba."
            exit 1
          fi

          echo ""
          if [ "$DRIFT" -gt 0 ]; then
            echo "ℹ️  $DRIFT design-system drift(s) encontrados (modo informativo — no bloquean)"
          fi
          echo "✅ Design check superado"

      - name: Comment PR (on first offense)
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/impeccable-report.txt', 'utf8');
            const lines = report.split('\n').filter(l => l.includes('[') && !l.includes('design-system'));
            let body = '## 🔴 Impeccable Design Check\n\n';
            body += 'Se detectaron anti-patrones de UI que deben corregirse:\n\n';
            lines.forEach(l => {
              const match = l.match(/\[([^\]]+)\]/);
              const rule = match ? match[1] : 'unknown';
              body += `- **${rule}**: \`${l.split(':')[0].trim()}\`\n`;
            });
            body += '\n> Corre con `npx impeccable detect src/` localmente para ver detalles completos.';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
